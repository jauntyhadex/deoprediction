<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>DeoPrediction</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <div class="hero">
      <h1>DeoPrediction</h1>
      <p id="status">Loading...</p>
      <nav>
        <button onclick="showPage('home')">Home</button>
        <button onclick="showPage('fixtures')">Fixtures</button>
        <button onclick="showPage('picks')">Top Picks</button>
        <button onclick="showPage('markets')">Top Markets</button>
        <button onclick="showPage('competitions')">Competitions</button>
      </nav>
    </div>

    <section id="home-page">
      <h2>Database</h2>
      <div id="counts"></div>

      <h2>Top Picks</h2>
      <div id="home-picks"></div>
    </section>

    <section id="fixtures-page" class="hidden">
      <h2>Fixtures</h2>

      <div class="filters">
        <input id="fixture-search" placeholder="Search team or competition" />
        <select id="fixture-status">
          <option value="">Any status</option>
          <option value="TIMED">Timed</option>
          <option value="SCHEDULED">Scheduled</option>
          <option value="FINISHED">Finished</option>
          <option value="IN_PLAY">In play</option>
          <option value="PAUSED">Paused</option>
          <option value="POSTPONED">Postponed</option>
          <option value="CANCELLED">Cancelled</option>
        </select>
        <label>
          <input id="upcoming-only" type="checkbox" checked />
          Upcoming only
        </label>
        <button onclick="loadFixtures()">Load fixtures</button>
      </div>

      <div id="fixtures"></div>
    </section>

    <section id="picks-page" class="hidden">
      <h2>Top Picks</h2>

      <div class="filters">
        <select id="pick-grade">
          <option value="">Any grade</option>
          <option value="A+">A+</option>
          <option value="A">A</option>
          <option value="B">B</option>
          <option value="C">C</option>
        </select>

        <select id="pick-market">
          <option value="">Any market</option>
          <option value="MATCH_RESULT">Match Result</option>
          <option value="TOTAL_GOALS">Total Goals</option>
          <option value="BTTS">BTTS</option>
          <option value="ASIAN_HANDICAP">Asian Handicap</option>
          <option value="DOUBLE_CHANCE">Double Chance</option>
          <option value="DRAW_NO_BET">Draw No Bet</option>
          <option value="FIRST_HALF_TOTAL_GOALS">First Half Total Goals</option>
          <option value="SECOND_HALF_TOTAL_GOALS">Second Half Total Goals</option>
        </select>

        <label>
          <input id="one-pick-per-fixture" type="checkbox" checked />
          One per fixture
        </label>

        <button onclick="loadPicks()">Load picks</button>
      </div>

      <div id="picks"></div>
    </section>

    <section id="markets-page" class="hidden">
      <h2>Top Markets</h2>

      <div class="filters">
        <select id="market-filter">
          <option value="">Any market</option>
          <option value="MATCH_RESULT">Match Result</option>
          <option value="TOTAL_GOALS">Total Goals</option>
          <option value="BTTS">BTTS</option>
          <option value="ASIAN_HANDICAP">Asian Handicap</option>
          <option value="DOUBLE_CHANCE">Double Chance</option>
          <option value="DRAW_NO_BET">Draw No Bet</option>
          <option value="FIRST_HALF_TOTAL_GOALS">First Half Total Goals</option>
          <option value="SECOND_HALF_TOTAL_GOALS">Second Half Total Goals</option>
          <option value="HOME_TEAM_TOTAL">Home Team Total</option>
          <option value="AWAY_TEAM_TOTAL">Away Team Total</option>
        </select>

        <button onclick="loadMarkets()">Load markets</button>
      </div>

      <div id="markets"></div>
    </section>

    <section id="competitions-page" class="hidden">
      <h2>Competitions</h2>

      <div class="filters">
        <input id="competition-search" placeholder="Search competition or country" />

        <select id="competition-status">
          <option value="">Any reliability</option>
          <option value="RELIABLE">Reliable</option>
          <option value="PROMISING">Promising</option>
          <option value="LIMITED">Limited</option>
          <option value="WEAK">Weak</option>
        </select>

        <button onclick="loadCompetitions()">Load competitions</button>
      </div>

      <div id="competitions"></div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
